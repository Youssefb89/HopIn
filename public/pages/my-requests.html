<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Requests | HopIn</title>
  <link rel="icon" type="image/png" href="/Logo/HopIn%20Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body data-page="my-requests">
  <div id="navbar-slot"></div>

  <main class="container page-shell">
    <div class="content-card mb-4">
      <div class="d-flex justify-content-between flex-wrap gap-3 align-items-center">
        <div>
          <h1 class="page-title mb-1">My Requests</h1>
          <p class="placeholder-note mb-0">Track pending requests here. The current user comes from the navbar dropdown.</p>
        </div>
        <div class="view-toggle">
          <button class="btn btn-sm btn-light js-view-switch" data-view="rider" type="button">Rider View</button>
          <button class="btn btn-sm btn-light js-view-switch" data-view="driver" type="button">Driver View</button>
        </div>
      </div>
    </div>

    <div id="requests-feedback" class="mb-3"></div>
    <div id="my-requests-content" class="section-stack"></div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/my-requests.js"></script>
</body>
</html>
