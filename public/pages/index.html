<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HopIn</title>
  <link rel="icon" type="image/png" href="/Logo/HopIn%20Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body data-page="home">
  <div id="navbar-slot"></div>

  <main class="container page-shell">
    <section class="welcome-card">
      <div class="d-flex align-items-center gap-3 mb-2">
        <img class="welcome-brand" src="/Logo/HopIn%20Logo.png" alt="HopIn logo">
        <div>
          <h1 class="h2 mb-1 fw-bold">Welcome to HopIn</h1>
          <p class="mb-0">Find shared campus commutes, offer empty seats, and keep your daily ride plans in one place.</p>
        </div>
      </div>

      <div class="row g-3 welcome-actions mt-3">
        <div class="col-md-6">
          <a class="btn btn-light" href="/find-ride">Find a Ride</a>
        </div>
        <div class="col-md-6">
          <a class="btn btn-outline-light" href="/profile-settings">Become a Driver</a>
        </div>
      </div>
    </section>

    <section class="rides-card">
      <div class="rides-card-header">
        <div>
          <h2 class="section-title mb-1">Recent Rides</h2>
          <p class="placeholder-note mb-0">A quick look at the latest available rides.</p>
        </div>
        <a class="text-decoration-none fw-semibold" href="/find-ride">See All</a>
      </div>

      <div id="home-rides-list" class="section-stack">
        <div class="detail-loading">Loading rides...</div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/home.js"></script>
</body>
</html>
