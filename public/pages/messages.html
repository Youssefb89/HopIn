<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | HopIn</title>
  <link rel="icon" type="image/png" href="/Logo/HopIn%20Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body data-page="messages">
  <div id="navbar-slot"></div>

  <main class="container page-shell">
    <section class="content-card page-hero-card mb-4">
      <div class="d-flex justify-content-between gap-3 flex-wrap align-items-center">
        <div>
          <h1 class="page-title mb-1">Messages</h1>
          <p class="placeholder-note mb-0">Chats unlock only after a ride request has been accepted.</p>
        </div>
        <a class="btn btn-outline-primary" href="/my-rides">Go to My Rides</a>
      </div>
      <p id="messages-hero-copy" class="placeholder-note mt-3 mb-0"></p>
    </section>

    <div id="messages-feedback" class="mb-3"></div>

    <section class="messages-shell">
      <aside class="messages-sidebar content-card">
        <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
          <div>
            <h2 class="section-title mb-1">Conversations</h2>
            <p class="placeholder-note mb-0">Accepted rides only.</p>
          </div>
        </div>
        <div id="messages-conversation-list" class="section-stack"></div>
      </aside>

      <section class="messages-thread content-card">
        <div id="messages-thread-header" class="mb-3"></div>
        <div id="messages-thread-body" class="messages-thread-body"></div>
        <form id="message-compose-form" class="messages-compose mt-3 d-none-soft">
          <label class="form-label" for="message-compose-input">Write a message</label>
          <div class="input-group">
            <input id="message-compose-input" class="form-control" type="text" placeholder="Type here...">
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/messages.js"></script>
</body>
</html>
