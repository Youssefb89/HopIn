<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Ride | HopIn</title>
  <link rel="icon" type="image/png" href="/Logo/HopIn%20Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body data-page="post-a-ride">
  <div id="navbar-slot"></div>

  <main class="container page-shell">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="content-card">
          <h1 class="section-title mb-1">Post a Ride</h1>
          <p class="placeholder-note">
            Create a ride that riders can discover in the app and request seats on.
          </p>
          <div class="info-panel mt-4">
            <div class="mini-label">Current User</div>
            <p class="mb-2">This page uses whichever user is selected in the navbar dropdown.</p>
            <a class="btn btn-sm btn-outline-primary" href="/vehicle-settings">Manage vehicle</a>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div id="post-ride-feedback" class="mb-3"></div>

        <div class="content-card">
          <div class="d-flex justify-content-between flex-wrap gap-3 mb-4">
            <div>
              <h2 class="section-title mb-1">Ride details</h2>
              <p class="placeholder-note mb-0">Simple form now, real driver data later.</p>
            </div>
            <span class="ride-pill">Driver flow</span>
          </div>

          <form id="post-ride-form" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Pickup / From</label>
              <input class="form-control" name="origin" type="text" placeholder="Albert Street & 25th Ave" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Drop-off / To</label>
              <input class="form-control" name="destination" type="text" placeholder="University of Regina" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Date</label>
              <input class="form-control" name="ride_date" type="date" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Time</label>
              <input class="form-control" name="ride_time" type="time" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Vehicle</label>
              <select class="form-select" name="vehicle_id" id="vehicle-select">
                <option value="">Loading vehicles...</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Seats Available</label>
              <select class="form-select" name="seats_available">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Status</label>
              <input class="form-control" type="text" value="open" disabled>
            </div>

            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="4" placeholder="Smoke-free ride, please be ready on time"></textarea>
            </div>

            <div class="col-12 d-flex flex-wrap gap-2">
              <button class="btn btn-primary" type="submit">Post Ride</button>
              <a class="btn btn-outline-secondary" href="/find-ride">Back to Find Ride</a>
            </div>
          </form>
        </div>

        <div id="post-ride-success" class="mt-4"></div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/post-a-ride.js"></script>
</body>
</html>
