<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Ride | HopIn</title>
  <link rel="icon" type="image/png" href="/Logo/HopIn%20Logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body data-page="find-ride">
  <div id="navbar-slot"></div>

  <main class="container page-shell">
    <div class="find-shell">
      <section class="search-toolbar find-toolbar">
        <div class="input-group">
          <span class="input-group-text">Search</span>
          <input id="ride-search-input" class="form-control" type="text" placeholder="Search by pickup, destination, or driver...">
        </div>
      </section>

      <div class="find-toolbar-row">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <button id="toggle-filter-panel" class="btn btn-outline-secondary btn-sm" type="button">Filters</button>
          <span id="ride-results-count">0 rides found</span>
        </div>
        <div class="toggle-group">
          <button class="btn btn-sm btn-light js-find-view active" data-view="list" type="button">List</button>
          <button class="btn btn-sm btn-light js-find-view" data-view="map" type="button">Map</button>
        </div>
      </div>

      <section id="find-filter-panel" class="content-card find-filter-panel d-none-soft">
        <form id="ride-filter-form" class="row g-3">
          <div class="col-md-6 col-lg-3">
            <label class="form-label">From</label>
            <input class="form-control" name="from" type="text" placeholder="Harbour Landing">
          </div>
          <div class="col-md-6 col-lg-3">
            <label class="form-label">To</label>
            <input class="form-control" name="to" type="text" placeholder="University of Regina">
          </div>
          <div class="col-md-6 col-lg-3">
            <label class="form-label">Date</label>
            <input class="form-control" name="date" type="date">
          </div>
          <div class="col-md-6 col-lg-3">
            <label class="form-label">Seats Needed</label>
            <select class="form-select" name="seats">
              <option value="">Any</option>
              <option value="1">1 seat</option>
              <option value="2">2 seats</option>
              <option value="3">3 seats</option>
            </select>
          </div>
          <div class="col-12 filter-actions">
            <button id="clear-ride-filters" class="btn btn-outline-secondary" type="button">Clear All</button>
            <button class="btn btn-primary" type="submit">Apply Filters</button>
          </div>
        </form>
      </section>

      <section id="find-map-panel" class="content-card map-card d-none-soft mb-3">
        <div class="find-map-layout">
          <div id="find-map-canvas" class="leaflet-map-canvas"></div>
          <div class="find-map-placeholder-copy">
            <h2 class="section-title mb-2">Ride Map</h2>
            <p class="placeholder-note mb-3">This map uses Leaflet and OpenStreetMap tiles with preview route pin points for the available rides.</p>
            <div id="find-map-summary" class="find-map-summary"></div>
          </div>
        </div>
      </section>

      <section id="find-ride-results" class="section-stack"></section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/find-ride.js"></script>
</body>
</html>
